program: scripts/rsl_rl/train.py
project: UAV_Indoor_Exploration
method: bayes
metric:
  name: Eval/hover_success
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 150
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --task=Template-Uav-Hover-v0
  - --headless
  - --num_envs=2048
  - --max_iterations=500
  - ${args_no_hyphens}

parameters:
  # --- primary task (always on: min > 0) ---
  env.rewards.height_tracking.weight:      {distribution: uniform, min: 1.0, max: 15.0}
  env.rewards.height_tracking.params.std:  {distribution: uniform, min: 0.3, max: 2.5}
  env.rewards.xy_tracking.weight:          {distribution: uniform, min: 1.0, max: 10.0}
  env.rewards.xy_tracking.params.std:      {distribution: uniform, min: 0.3, max: 2.5}

  # --- optional terms (min/max touches 0 => sweep can switch them off) ---
  env.rewards.episode_yaw.weight:          {distribution: uniform, min: 0.0, max: 5.0}
  env.rewards.episode_yaw.params.std:      {distribution: uniform, min: 0.3, max: 1.5}
  env.rewards.alive.weight:                {distribution: uniform, min: 0.0, max: 1.0}
  env.rewards.flat_orientation.weight:     {distribution: uniform, min: -0.5, max: 0.0}
  env.rewards.base_ang_vel.weight:         {distribution: uniform, min: -0.1, max: 0.0}
  env.rewards.action_rate.weight:          {distribution: uniform, min: -0.05, max: 0.0}
  env.rewards.action_l2.weight:            {distribution: uniform, min: -0.05, max: 0.0}
  env.rewards.horizontal_velocity.weight:  {distribution: uniform, min: -0.1, max: 0.0}
  env.rewards.lin_vel_z.weight:            {distribution: uniform, min: -0.02, max: 0.0}

  # --- crash handling ---
  # threshold switches structure: 1.0 = crash terminates, 1e9 (large) = never terminates (penalty-only).
  # the .5 keeps it a float so wandb can't normalize it to int (IsaacLab rejects int here).
  env.terminations.crash.params.threshold: {values: [1.0, 1000000000.5]}
  env.rewards.crash_penalty.weight:        {distribution: uniform, min: -3.0, max: 0.0}
  env.rewards.terminating.weight:          {distribution: uniform, min: -20.0, max: 0.0}

  # --- PPO ---
  agent.algorithm.learning_rate:           {distribution: log_uniform_values, min: 0.0001, max: 0.001}
  agent.algorithm.entropy_coef:            {distribution: log_uniform_values, min: 0.0001, max: 0.01}
  agent.algorithm.gamma:                   {values: [0.98, 0.99, 0.995, 0.999]}
  agent.num_steps_per_env:                 {values: [24, 48, 96]}
